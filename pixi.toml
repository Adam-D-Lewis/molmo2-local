[workspace]
name = "molmo2-local"
channels = ["nvidia", "conda-forge"]
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
cuda = "12"

[dependencies]
python = ">=3.11,<3.13"
pip = "*"

[pypi-dependencies]
torch = { version = ">=2.6", index = "https://download.pytorch.org/whl/cu126" }
torchvision = { version = "*", index = "https://download.pytorch.org/whl/cu126" }
transformers = ">=4.48,<5.0"
accelerate = "*"
bitsandbytes = ">=0.43"
torchcodec = ">=0.0.7"
pillow = "*"
numpy = "*"
einops = "*"
decord2 = "*"
molmo-utils = "*"
huggingface-hub = "*"
sentencepiece = "*"

[tasks]
chat = "python chat.py"
download = "python download_model.py"
